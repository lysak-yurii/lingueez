name: Test build (all platforms)

# Manual only: builds the Windows installer, the Linux AppImage, and the Flatpak
# bundle as downloadable ARTIFACTS so all three can be tested before a real release.
# This is NOT a release — nothing is published and no tag is needed (release.yml
# stays tag-only and untouched). Trigger it from the Actions tab ("Run workflow")
# on whichever branch you want to test. Mirrors release.yml's build jobs; if those
# change, update them here too.
on:
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        shell: bash
        run: |
          V=$(python3 -c "import re,pathlib;print(re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"',pathlib.Path('app/version.py').read_text()).group(1))")
          echo "version=$V" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Windows)
        shell: bash
        run: |
          mkdir -p ffmpeg/bin
          curl -L -o ff.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ff.zip -off_extract
          BIN=$(find ff_extract -name ffmpeg.exe | head -1)
          cp "$BIN" ffmpeg/bin/ffmpeg.exe
          cp "$(dirname "$BIN")/ffprobe.exe" ffmpeg/bin/ffprobe.exe
      - name: Build
        run: pyinstaller lingueez.spec
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ needs.version.outputs.version }}" lingueez.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/Lingueez-${{ needs.version.outputs.version }}-Setup.exe

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Linux static)
        run: |
          mkdir -p ffmpeg/bin
          curl -fL -o ff.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar xf ff.tar.xz
          DIR=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-linux64-gpl' | head -1)
          cp "$DIR/bin/ffmpeg" ffmpeg/bin/ffmpeg
          cp "$DIR/bin/ffprobe" ffmpeg/bin/ffprobe
          chmod +x ffmpeg/bin/ffmpeg ffmpeg/bin/ffprobe
      - name: Install Xvfb
        # pynput's X11 backend connects to an X server at import time, so PyInstaller
        # can only collect it under a display (else the global hotkey ships dead).
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build
        run: xvfb-run -a pyinstaller lingueez.spec
      - name: Assemble AppDir
        run: |
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/Lingueez/. "$APPDIR/usr/bin/"
          cp assets/icons/icon.png "$APPDIR/Lingueez.png"
          cat > "$APPDIR/Lingueez.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lingueez
          Exec=Lingueez
          Icon=Lingueez
          Categories=Education;
          StartupWMClass=Lingueez
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE=$(dirname "$(readlink -f "$0")")
          exec "$HERE/usr/bin/Lingueez" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
      - name: Install zsync (AppImage delta updates)
        run: sudo apt-get update && sudo apt-get install -y zsync
      - name: Build AppImage
        run: |
          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run \
            -u "gh-releases-zsync|lysak-yurii|lingueez|latest|Lingueez-*-x86_64.AppImage.zsync" \
            AppDir \
            "Lingueez-${{ needs.version.outputs.version }}-x86_64.AppImage"
      - name: Verify zsync generated
        run: test -f "Lingueez-${{ needs.version.outputs.version }}-x86_64.AppImage.zsync"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            Lingueez-${{ needs.version.outputs.version }}-x86_64.AppImage
            Lingueez-${{ needs.version.outputs.version }}-x86_64.AppImage.zsync

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      # KDE image matches runtime org.kde.Platform//6.8 (Python 3.12) used by the
      # manifest + the PySide base app.
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.8
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install the PySide base app
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --noninteractive flathub io.qt.PySide.BaseApp//6.8
      - name: Build and bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lingueez.flatpak
          manifest-path: packaging/flatpak/app.lingueez.Lingueez.yml
          cache-key: flatpak-builder-${{ github.sha }}
