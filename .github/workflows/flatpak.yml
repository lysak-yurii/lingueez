name: Flatpak (test build)

# Branch-only: builds a downloadable .flatpak bundle so the sandboxed build can be
# tested before merging. This is NOT a release — it uploads an artifact, nothing is
# published. Runs on the flatpak-support branch and on manual dispatch.
on:
  push:
    branches: [flatpak-support]
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    container:
      # KDE image matches runtime org.kde.Platform//6.8 (Python 3.12) used by the
      # manifest + the PySide base app. The maintained images live on GHCR
      # (the bilelmoussaoui Docker Hub repo stops at kde-6.7).
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.8
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install the PySide base app
        # Provides PySide6/shiboken6; the runtime/sdk ship with the container.
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --noninteractive flathub io.qt.PySide.BaseApp//6.8

      - name: Build and bundle
        # Python deps are vendored (committed packaging/flatpak/python3-deps.json),
        # so no generation step — the build installs them offline.
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lingueez.flatpak
          manifest-path: packaging/flatpak/app.lingueez.Lingueez.yml
          cache-key: flatpak-builder-${{ github.sha }}
