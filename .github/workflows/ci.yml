name: CI

# Lint + test on every push and pull request. The release workflow runs the
# same checks as a gate before any installer is built (see release.yml).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: System libraries for headless Qt
        # libegl1/libgl1: Qt rendering; libpulse0: Qt Multimedia links libpulse
        # at import time (used by the audio player modules).
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libpulse0
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check tests
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -t . -p 'test_*.py'
