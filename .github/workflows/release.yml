name: Release

# Build and publish artifacts when a version tag is pushed, e.g.:
#   git tag v2.0.1 && git push origin v2.0.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  # Fail fast if the tag and app/version.py disagree, so the in-app updater
  # (which compares the release tag against APP_VERSION) never sees a mismatch.
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        shell: bash
        run: |
          APP_VERSION=$(python -c "import re,pathlib;m=re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"',pathlib.Path('app/version.py').read_text());print(m.group(1))")
          TAG="${GITHUB_REF_NAME#v}"
          echo "app/version.py = $APP_VERSION ; tag = $TAG"
          if [ "$APP_VERSION" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match APP_VERSION $APP_VERSION in app/version.py"
            exit 1
          fi
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"

  # Lint + unit tests must pass before any artifact is built, so a broken
  # import or a regression can never ship in a tagged release. Mirrors ci.yml.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: System libraries for headless Qt
        # libegl1/libgl1: Qt rendering; libpulse0: Qt Multimedia links libpulse
        # at import time (used by the audio player modules).
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libpulse0
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check tests
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -t . -p 'test_*.py'

  build-windows:
    needs: [validate, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Windows)
        shell: bash
        run: |
          mkdir -p ffmpeg/bin
          curl -L -o ff.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ff.zip -off_extract
          BIN=$(find ff_extract -name ffmpeg.exe | head -1)
          cp "$BIN" ffmpeg/bin/ffmpeg.exe
          cp "$(dirname "$BIN")/ffprobe.exe" ffmpeg/bin/ffprobe.exe
      - name: Build
        run: pyinstaller lingueez.spec
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ needs.validate.outputs.version }}" lingueez.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: installer_output/Lingueez-${{ needs.validate.outputs.version }}-Setup.exe
      # --- Microsoft Store package (MSIX) ---------------------------------
      # Reuses the SAME dist/Lingueez output as the installer above; the .exe
      # steps are untouched. Produced UNSIGNED — the Store re-signs on upload,
      # so no code-signing certificate is needed. Package identity is baked into
      # packaging/msix/AppxManifest.xml (from Partner Center); only the version
      # is templated here.
      - name: Stage MSIX layout
        shell: bash
        run: |
          set -euo pipefail
          LAYOUT=msix_layout
          rm -rf "$LAYOUT"
          mkdir -p "$LAYOUT"
          cp -r dist/Lingueez/* "$LAYOUT"/
          cp -r packaging/msix/Assets "$LAYOUT"/Assets
          VERSION="${{ needs.validate.outputs.version }}.0"   # Store requires a 4-part x.y.z.0
          sed -e "s#{{VERSION}}#${VERSION}#g" \
              packaging/msix/AppxManifest.xml > "$LAYOUT/AppxManifest.xml"
      - name: Build MSIX
        shell: pwsh
        run: |
          $makeappx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $makeappx) { throw "makeappx.exe not found in the Windows SDK" }
          New-Item -ItemType Directory -Force -Path installer_output | Out-Null
          $out = "installer_output\Lingueez-${{ needs.validate.outputs.version }}.msix"
          & $makeappx pack /d msix_layout /p $out /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx pack failed ($LASTEXITCODE)" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: installer_output/Lingueez-${{ needs.validate.outputs.version }}.msix

  build-linux:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Linux static)
        run: |
          mkdir -p ffmpeg/bin
          curl -fL -o ff.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar xf ff.tar.xz
          DIR=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-linux64-gpl' | head -1)
          cp "$DIR/bin/ffmpeg" ffmpeg/bin/ffmpeg
          cp "$DIR/bin/ffprobe" ffmpeg/bin/ffprobe
          chmod +x ffmpeg/bin/ffmpeg ffmpeg/bin/ffprobe
      - name: Install Xvfb
        # pynput's X11 backend (pynput.keyboard._xorg) connects to an X server at
        # import time, so PyInstaller can only collect it when a display exists.
        # On the headless runner the collection silently yields nothing and the
        # global hotkey ends up dead — so build under a virtual display.
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build
        run: xvfb-run -a pyinstaller lingueez.spec
      - name: Assemble AppDir
        run: |
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/Lingueez/. "$APPDIR/usr/bin/"
          cp assets/icons/icon.png "$APPDIR/Lingueez.png"
          cat > "$APPDIR/Lingueez.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lingueez
          Exec=Lingueez
          Icon=Lingueez
          Categories=Education;
          StartupWMClass=Lingueez
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE=$(dirname "$(readlink -f "$0")")
          exec "$HERE/usr/bin/Lingueez" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
      - name: Install zsync (AppImage delta updates)
        # appimagetool only writes the .zsync sidecar when zsyncmake is on PATH;
        # the continuous build doesn't always bundle it, so install it explicitly.
        run: sudo apt-get update && sudo apt-get install -y zsync
      - name: Build AppImage
        # -u embeds gh-releases-zsync update information in the .upd_info ELF
        # section so AppImageUpdate / AppImageLauncher / AM can do delta updates,
        # and makes appimagetool emit the matching .zsync. 'latest' tracks the
        # newest stable release; the repo field is the canonical lowercase name,
        # while the filename glob keeps the Lingueez-* artifact casing.
        run: |
          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run \
            -u "gh-releases-zsync|lysak-yurii|lingueez|latest|Lingueez-*-x86_64.AppImage.zsync" \
            AppDir \
            "Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage"
      - name: Verify zsync generated
        # Fail loudly rather than ship a half-updatable AppImage if zsyncmake was
        # silently skipped (the .upd_info would resolve to a missing .zsync).
        run: test -f "Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage.zsync"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage
            Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage.zsync

  # Build the offline, Flathub-style Flatpak bundle and attach it to the release as a
  # direct download. It's content-identical to what Flathub publishes (same manifest)
  # and acts as a build-time check that the manifest still works. Flathub itself builds
  # and publishes the store version from packaging/flatpak/ separately — this job does
  # NOT publish to Flathub. The flatpak-builder action uploads the bundle as an
  # artifact, which the release job picks up below.
  build-flatpak:
    needs: [validate, test]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install the PySide base app
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --noninteractive flathub io.qt.PySide.BaseApp//6.10
      - name: Build and bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Lingueez-${{ needs.validate.outputs.version }}-x86_64.flatpak
          manifest-path: packaging/flatpak/app.lingueez.Lingueez.yml
          cache-key: flatpak-builder-${{ github.sha }}

  release:
    needs: [validate, build-windows, build-linux, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Exclude the MSIX from Release assets
        # The unsigned Store MSIX won't install outside the Microsoft Store, so it
        # must not be a public Release download — it stays available as the
        # build-windows CI artifact for manual upload to Partner Center.
        run: rm -rf artifacts/windows-msix
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lingueez ${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
