name: Release

# Build and publish artifacts when a version tag is pushed, e.g.:
#   git tag v2.0.1 && git push origin v2.0.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  # Fail fast if the tag and app/version.py disagree, so the in-app updater
  # (which compares the release tag against APP_VERSION) never sees a mismatch.
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        shell: bash
        run: |
          APP_VERSION=$(python -c "import re,pathlib;m=re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"',pathlib.Path('app/version.py').read_text());print(m.group(1))")
          TAG="${GITHUB_REF_NAME#v}"
          echo "app/version.py = $APP_VERSION ; tag = $TAG"
          if [ "$APP_VERSION" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match APP_VERSION $APP_VERSION in app/version.py"
            exit 1
          fi
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"

  # Lint + unit tests must pass before any artifact is built, so a broken
  # import or a regression can never ship in a tagged release. Mirrors ci.yml.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: System libraries for headless Qt
        # libegl1/libgl1: Qt rendering; libpulse0: Qt Multimedia links libpulse
        # at import time (used by the audio player modules).
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libpulse0
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check tests
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -t . -p 'test_*.py'

  build-windows:
    needs: [validate, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Windows)
        shell: bash
        run: |
          mkdir -p ffmpeg/bin
          curl -L -o ff.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ff.zip -off_extract
          BIN=$(find ff_extract -name ffmpeg.exe | head -1)
          cp "$BIN" ffmpeg/bin/ffmpeg.exe
          cp "$(dirname "$BIN")/ffprobe.exe" ffmpeg/bin/ffprobe.exe
      - name: Build
        run: pyinstaller lingueez.spec
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ needs.validate.outputs.version }}" lingueez.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: installer_output/Lingueez-${{ needs.validate.outputs.version }}-Setup.exe

  build-linux:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch ffmpeg (Linux static)
        run: |
          mkdir -p ffmpeg/bin
          curl -fL -o ff.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar xf ff.tar.xz
          DIR=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-linux64-gpl' | head -1)
          cp "$DIR/bin/ffmpeg" ffmpeg/bin/ffmpeg
          cp "$DIR/bin/ffprobe" ffmpeg/bin/ffprobe
          chmod +x ffmpeg/bin/ffmpeg ffmpeg/bin/ffprobe
      - name: Build
        run: pyinstaller lingueez.spec
      - name: Assemble AppDir
        run: |
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/Lingueez/. "$APPDIR/usr/bin/"
          cp assets/icons/icon.png "$APPDIR/Lingueez.png"
          cat > "$APPDIR/Lingueez.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lingueez
          Exec=Lingueez
          Icon=Lingueez
          Categories=Education;
          StartupWMClass=Lingueez
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE=$(dirname "$(readlink -f "$0")")
          exec "$HERE/usr/bin/Lingueez" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
      - name: Build AppImage
        run: |
          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir \
            "Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: Lingueez-${{ needs.validate.outputs.version }}-x86_64.AppImage

  release:
    needs: [validate, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lingueez ${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
