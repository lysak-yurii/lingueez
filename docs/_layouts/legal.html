<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>{{ page.title }} · Lingueez</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1c2733; --dim: #5f6f7f; --border: #e3e8ee;
      --accent: #2f6fed; --surface: #f6f8fb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101418; --fg: #e6edf3; --dim: #8b98a5; --border: #2c3640;
        --accent: #4f8cff; --surface: #1c232b;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .topbar {
      border-bottom: 1px solid var(--border); padding: 14px 0;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 0 22px; }
    .brand { font-weight: 700; color: var(--fg); text-decoration: none; font-size: 17px; }
    main { padding: 34px 0 64px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.9rem; line-height: 1.2; margin: 0 0 .2em; }
    h2 { font-size: 1.3rem; margin: 1.9em 0 .5em; padding-top: .3em; }
    h3 { font-size: 1.08rem; margin: 1.5em 0 .4em; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    blockquote {
      margin: 1.2em 0; padding: .6em 1em; border-left: 3px solid var(--accent);
      background: var(--surface); border-radius: 0 8px 8px 0; color: var(--fg);
    }
    blockquote p { margin: .3em 0; }
    code {
      background: var(--surface); padding: .12em .4em; border-radius: 5px;
      font-size: .9em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    table {
      border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: .94rem;
      display: block; overflow-x: auto;
    }
    th, td { border: 1px solid var(--border); padding: 8px 11px; text-align: left; vertical-align: top; }
    th { background: var(--surface); font-weight: 600; }
    .muted { color: var(--dim); font-size: .9rem; }
    footer { border-top: 1px solid var(--border); padding: 22px 0; color: var(--dim); font-size: .88rem; }
  </style>
</head>
<body>
  <div class="topbar"><div class="wrap"><a class="brand" href="/">Lingueez</a></div></div>
  <main><div class="wrap">{{ content }}</div></main>
  <footer><div class="wrap">© 2024–2026 Yurii Lysak · Lingueez</div></footer>
</body>
</html>
